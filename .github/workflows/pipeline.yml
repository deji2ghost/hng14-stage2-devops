name: CI/CD Pipeline

on:
  push:
    branches: ["**"] # Run on all branches
  pull_request:

jobs:
  # ─────────────────────────────────────────────
  # STAGE 1: LINT
  # Check code style and formatting errors
  # ─────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint Python files
        run: flake8 api/main.py worker/worker.py --max-line-length=100

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint
        run: cd frontend && npm install eslint --save-dev

      - name: Lint JavaScript
        run: cd frontend && npx eslint app.js

      - name: Lint Dockerfiles with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: api/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: worker/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: frontend/Dockerfile

  # ─────────────────────────────────────────────
  # STAGE 2: TEST
  # ─────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint # Only runs if lint passes
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install pytest pytest-cov fakeredis fastapi httpx

      - name: Run tests with coverage
        run: |
          cd api
          PYTHONPATH=. pytest tests/ -v --cov=main --cov-report=xml --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/htmlcov/

  # ─────────────────────────────────────────────
  # STAGE 3: BUILD & PUSH TO LOCAL REGISTRY
  # ─────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test

    # This runs a local Docker registry inside the pipeline
    # Think of it like a temporary private Docker Hub just for this run
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

  # ─────────────────────────────────────────────
  # STAGE 4: SECURITY SCAN
  # ─────────────────────────────────────────────
  security-scan:
    runs-on: ubuntu-latest
    needs: build

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Rebuild images for scanning
        run: |
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:latest ./frontend

      - name: Scan API image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/api:latest
          format: table # 👈 change from sarif
          severity: CRITICAL
          exit-code: "1" # Fail pipeline on CRITICAL findings

      - name: Scan Worker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/worker:latest
          format: table
          severity: CRITICAL
          exit-code: "1"

      - name: Scan Frontend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: localhost:5000/frontend:latest
          format: table
          severity: CRITICAL
          exit-code: "1"

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: "*.sarif"

  # ─────────────────────────────────────────────
  # STAGE 5: INTEGRATION TEST
  # ─────────────────────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Start full stack
        run: docker compose up -d --build

      # 👇 ADD DEBUG STEP HERE
      - name: Debug containers
        run: |
        docker compose ps
        docker compose logs frontend

      - name: Wait for frontend to be ready
        run: |
          echo "Waiting for frontend..."
          for i in {1..20}; do
            if curl -s http://localhost:3000 > /dev/null; then
              echo "Frontend is ready"
              exit 0
            fi
            sleep 3
          done
          echo "Frontend failed to start"
          docker compose logs
          exit 1

      - name: Submit a job and poll until complete
        run: |
          # Submit a job through the frontend
          JOB_RESPONSE=$(curl -s -X POST http://localhost:3000/submit)
          JOB_ID=$(echo $JOB_RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job submitted: $JOB_ID"

          # Poll every 3 seconds, up to 30 seconds
          for i in {1..10}; do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "✅ Job completed successfully"
              exit 0
            fi
            sleep 3
          done
          echo "❌ Job did not complete in time"
          exit 1

      - name: Tear down stack (always runs)
        if: always() # This runs even if the test above fails
        run: docker compose down -v

  # ─────────────────────────────────────────────
  # STAGE 6: DEPLOY (only on push to main)
  # ─────────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy with rolling update via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/app
            git pull origin main

            # Pull new images
            docker compose pull

            # Rolling update: bring up new container, check health, then stop old
            docker compose up -d --no-deps --build api

            # Wait up to 60s for health check to pass
            TIMEOUT=60
            ELAPSED=0
            while [ $ELAPSED -lt $TIMEOUT ]; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q api))
              if [ "$STATUS" = "healthy" ]; then
                echo "New container is healthy. Deploy complete."
                exit 0
              fi
              sleep 5
              ELAPSED=$((ELAPSED+5))
            done

            echo "Health check failed. Rolling back."
            docker compose up -d --no-deps  # restart old version
            exit 1
