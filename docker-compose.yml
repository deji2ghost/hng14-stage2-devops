

# Named network — all services talk to each other through this
# It's like putting all services on the same private Wi-Fi
networks:
  internal:
    driver: bridge

services:

  redis:
    image: redis:7-alpine
    networks:
      - internal
    # ❌ No "ports:" here — Redis is NOT exposed to your host machine
    # Only other containers on the "internal" network can reach it
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  api:
    build: ./api
    networks:
      - internal
    environment:
      # Values come from your .env file — nothing hardcoded here
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy  # waits until Redis passes its healthcheck
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  worker:
    build: ./worker
    networks:
      - internal
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  frontend:
    build: ./frontend
    networks:
      - internal
    ports:
      - "3000:3000"   # Only the frontend is exposed to the outside world
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M